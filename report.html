<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Shield | Report Spam & Malicious URLs</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff1493;
            --secondary: #00bfff;
            --bg-dark: #050505;
            --bg-card: rgba(10, 10, 25, 0.8);
            --safe: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(75, 0, 130, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 20, 147, 0.1) 0%, transparent 40%);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 40px;
        }

        .report-section {
            background: var(--bg-card);
            border: 1px solid rgba(255, 20, 147, 0.3);
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            text-transform: uppercase;
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .submit-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-family: 'Orbitron';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            box-shadow: 0 0 15px var(--primary);
            transform: translateY(-2px);
        }

        /* Search Section */
        .search-section {
            background: var(--bg-card);
            border: 1px solid rgba(0, 191, 255, 0.3);
            padding: 40px;
            border-radius: 15px;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-results {
            margin-top: 20px;
        }

        .report-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-info h3 {
            margin: 0;
            color: var(--secondary);
            font-family: 'Orbitron';
        }

        .report-info p {
            margin: 5px 0 0;
            color: #aaa;
        }

        .voting-system {
            display: flex;
            gap: 15px;
        }

        .vote-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .vote-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .vote-btn.up:hover { color: var(--safe); border-color: var(--safe); }
        .vote-btn.down:hover { color: var(--danger); border-color: var(--danger); }

        .remove-vote-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 5px;
            display: block;
            width: 100%;
            transition: all 0.3s;
        }

        .remove-vote-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--secondary);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">HEADER SHIELD</div>
    </nav>

        <div class="report-section">
            <h1 id="report-title">Report Spam / Malicious URL</h1>
            <p id="report-typewriter" style="color: #888; margin-bottom: 25px;">Help secure the web by reporting malicious URLs.</p>
            <div class="form-group">
                <label class="form-label">URL for Reporting</label>
                <input type="text" id="report-url" class="form-input" placeholder="e.g. phishing-site.com">
            </div>
            <div class="form-group">
                <label class="form-label">Description / Reason</label>
                <textarea id="report-desc" class="form-input" rows="4" placeholder="Why are you reporting this URL?"></textarea>
            </div>
            <button class="submit-btn" id="submit-report">SUBMIT REPORT</button>
            <div id="report-status" style="margin-top: 15px;"></div>
        </div>

        <div class="search-section">
            <h1 style="color: var(--secondary);">Community Reports</h1>
            <div class="search-bar">
                <input type="text" id="search-url" class="form-input" placeholder="Search a URL to see if it's reported...">
                <button class="submit-btn" style="background: var(--secondary);" id="btn-search">SEARCH</button>
            </div>

            <div id="search-results" class="search-results">
                <!-- Search results will appear here -->
            </div>
        </div>
    </div>

    <script src="cyber-theme.js"></script>
    <script>
        window.onload = () => {
            CyberTheme.typeWriter('report-typewriter', 'Help secure the web by reporting malicious URLs.', 30);
        }
        // Submit Report
        document.getElementById('submit-report').addEventListener('click', async () => {
            const url = document.getElementById('report-url').value;
            const description = document.getElementById('report-desc').value;
            const status = document.getElementById('report-status');

            if (!url || !description) {
                status.innerText = "Please fill all fields.";
                status.style.color = "var(--danger)";
                return;
            }

            try {
                const response = await fetch('https://headerback.onrender.com/report/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, description })
                });
                const data = await response.json();
                
                status.innerText = data.already_exists ? data.message : "Report Accepted";
                status.style.color = data.already_exists ? "var(--warning)" : "var(--safe)";
                
                if(!data.already_exists) {
                    document.getElementById('report-url').value = '';
                    document.getElementById('report-desc').value = '';
                }
            } catch (e) {
                status.innerText = "Error submitting report.";
            }
        });

        // Search Reports
        const performSearch = async () => {
            const query = document.getElementById('search-url').value;
            const resultsBox = document.getElementById('search-results');

            if (!query) return;

            resultsBox.innerHTML = '<div style="color: var(--secondary);">Searching records...</div>';

            try {
                const response = await fetch(`https://headerback.onrender.com/search/?url=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.results.length === 0) {
                    resultsBox.innerHTML = '<div style="color: #555;">No reports found for this URL.</div>';
                    return;
                }

                resultsBox.innerHTML = data.results.map(r => `
                    <div class="report-card">
                        <div class="report-info">
                            <h3>${r.url}</h3>
                            <p>${r.description}</p>
                        </div>
                        <div class="voting-system">
                            <div style="display: flex; flex-direction: column;">
                                <div style="display: flex; gap: 10px;">
                                    <button class="vote-btn up" onclick="vote(${r.id}, 'up')">👍 <span id="ups-${r.id}">${r.ups}</span></button>
                                    <button class="vote-btn down" onclick="vote(${r.id}, 'down')">👎 <span id="downs-${r.id}">${r.downs}</span></button>
                                </div>
                                <button class="remove-vote-btn" onclick="removeVote(${r.id})">Remove My Vote</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                resultsBox.innerHTML = '<div style="color: var(--danger);">Search failed.</div>';
            }
        };

        document.getElementById('btn-search').addEventListener('click', performSearch);

        // Vote Function
        window.vote = async (id, type) => {
            try {
                const response = await fetch('https://headerback.onrender.com/vote/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, vote: type })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`ups-${id}`).innerText = data.ups;
                    document.getElementById(`downs-${id}`).innerText = data.downs;
                } else if (data.error) {
                    alert(data.error);
                }
            } catch (e) {
                console.error("Voting failed");
            }
        };

        window.removeVote = async (id) => {
            try {
                const response = await fetch('https://headerback.onrender.com/remove_vote/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`ups-${id}`).innerText = data.ups;
                    document.getElementById(`downs-${id}`).innerText = data.downs;
                } else if (data.error) {
                    alert(data.error);
                }
            } catch (e) {
                console.error("Removing vote failed");
            }
        };
    </script>
</body>
</html>
