<!DOCTYPE html>
<html lang="en"> <!--Main dashboard and entry point for header shield-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Shield | Advanced Security Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff1493;    /* Pink */
            --secondary: #00bfff;  /* Blue */
            --bg-dark: #050505;
            --bg-card: rgba(10, 10, 25, 0.8);
            --safe: #00ff88;
            --warning: #ffcc00;
            --danger: #ff4444;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            overflow-x: hidden;
            background-image: 
            radial-gradient(circle at 20% 30%, rgba(75, 0, 130, 0.2) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(255, 20, 147, 0.1) 0%, transparent 40%);
        }

        /* Nav Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.3);
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-left: 30px;
            transition: color 0.3s;
            border: 1px solid transparent;
            padding: 8px 15px;
            border-radius: 4px;
        }

        .nav-links a:hover {
            color: var(--secondary);
            border-color: var(--secondary);
        }

        .nav-links a.active {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Main Layout */
        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
        }

        /* Hero / Input Section */
        .hero {
            text-align: center;
            margin-bottom: 50px;
            grid-column: 1 / -1;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
        }

        .hero p {
            color: var(--secondary);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .analyzer-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .analyzer-input {
            flex: 1;
            padding: 15px 25px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 191, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .analyzer-input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.2);
        }

        .analyze-btn {
            padding: 15px 35px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: linear-gradient(90deg, #00008b, #4b0082);
            border: 1px solid var(--secondary);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, #4b0082, var(--primary));
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.4);
        }

        /* Sidebar - History */
        .sidebar {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            height: fit-content;
        }

        .sidebar h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-top: 0;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--secondary);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transition: background 0.3s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .delete-history {
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 10px;
            transition: all 0.3s;
            display: inline-block;
            font-weight: 700;
        }

        .delete-history:hover {
            color: var(--danger);
            transform: scale(1.2);
        }

        .history-url {
            font-size: 0.9rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .history-score {
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* Loading / Progress */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        .loading-container {
            text-align: center;
            margin-top: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loading-text {
            color: #00bfff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 400px;
            height: 8px;
            background: rgba(0, 191, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 191, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.1);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #ff1493);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            transition: width 0.4s ease;
        }

        /* Score Display Card */
        .score-card {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 30px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .score-box {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .score-svg {
            transform: rotate(-90deg);
        }

        .score-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 10;
        }

        .score-circle-val {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 565.48; /* 2 * PI * 90 */
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 2s ease-out;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
        }

        .score-number {
            font-size: 3rem;
            font-weight: 700;
            display: block;
        }

        .score-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--secondary);
        }

        .risk-level {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .result-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .fix-box {
            margin-top: 15px;
            border-left: 3px solid var(--danger);
            border-radius: 4px;
        }

        .fix-box code {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #ff8c00;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">HEADER SHIELD</div>
        <div class="nav-links">
            <a href="#" class="active">Analyzer</a>
            <a href="quiz.html">Security Quiz</a>
            <a href="pwrdstrngth.html">Password Checker</a>
            <a href="page2.html">Security Guide</a>
            <a href="report.html" style="background: rgba(255, 20, 147, 0.2); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px; color: var(--primary); font-weight: 700;">Report URL</a>
        </div>
    </nav>

    <div class="main-wrapper">
        
        <div class="content-area">
            <div class="hero fade-in">
                <h1>Analyze. Secure. Protect.</h1>
                <p id="hero-typewriter">Advanced HTTP Header Security Intelligence</p>
            </div>

            <div class="analyzer-card fade-in">
                <div class="input-group">
                    <input type="text" id="target-url" class="analyzer-input" placeholder="Enter URL (e.g. google.com)">
                    <button class="analyze-btn" id="analyze-btn" onclick="CyberTheme.playInterfaceClick()">Scan URL</button>
                </div>
                <div style="margin-top: 15px; display: flex; justify-content: center;">
                    <button id="gen-fixes-btn" class="analyze-btn" style="background: transparent; border: 1px solid var(--secondary); color: var(--secondary); font-size: 0.9rem; padding: 10px 20px; width: auto; display: none;">
                        Auto-Generate Fix Summary
                    </button>
                </div>
            </div>

            <div id="results-display">
                <!-- Data will be populated here -->
            </div>

            <div id="fixes-display" style="margin-top: 30px;">
                <!-- Auto-Generated Fixes will appear here -->
            </div>
        </div>

        <div class="sidebar fade-in">
            <h2>RECENT SCANS</h2>
            <div id="history-list" class="history-list">
                <!-- History items will be populated here -->
                <div style="text-align: center; color: #555; padding: 20px;">No recent scans</div>
            </div>
        </div>

    </div>

    <script src="cyber-theme.js"></script>
    <script>
        let lastAnalysisData = null;

        // ── Security Header Config (mirrors the Python backend) ───────────────
        const SECURITY_HEADERS_CONFIG = {
            'X-Frame-Options': {
                fixes: {
                    raw:    "X-Frame-Options: DENY",
                    nginx:  'add_header X-Frame-Options "DENY" always;',
                    apache: 'Header set X-Frame-Options "DENY"'
                }
            },
            'Content-Security-Policy': {
                fixes: {
                    raw:    "Content-Security-Policy: default-src 'self';",
                    nginx:  "add_header Content-Security-Policy \"default-src 'self';\" always;",
                    apache: "Header set Content-Security-Policy \"default-src 'self';\""
                }
            },
            'Strict-Transport-Security': {
                fixes: {
                    raw:    "Strict-Transport-Security: max-age=31536000; includeSubDomains",
                    nginx:  'add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;',
                    apache: 'Header set Strict-Transport-Security "max-age=31536000; includeSubDomains"'
                }
            },
            'X-Content-Type-Options': {
                fixes: {
                    raw:    "X-Content-Type-Options: nosniff",
                    nginx:  'add_header X-Content-Type-Options "nosniff" always;',
                    apache: 'Header set X-Content-Type-Options "nosniff"'
                }
            },
            'Referrer-Policy': {
                fixes: {
                    raw:    "Referrer-Policy: no-referrer-when-downgrade",
                    nginx:  'add_header Referrer-Policy "no-referrer-when-downgrade" always;',
                    apache: 'Header set Referrer-Policy "no-referrer-when-downgrade"'
                }
            },
            'X-XSS-Protection': {
                fixes: {
                    raw:    "X-XSS-Protection: 1; mode=block",
                    nginx:  'add_header X-XSS-Protection "1; mode=block" always;',
                    apache: 'Header set X-XSS-Protection "1; mode=block"'
                }
            },
            'Permissions-Policy': {
                fixes: {
                    raw:    "Permissions-Policy: camera=(), microphone=(), geolocation=()",
                    nginx:  'add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;',
                    apache: 'Header set Permissions-Policy "camera=(), microphone=(), geolocation=()"'
                }
            },
            'Cross-Origin-Opener-Policy': {
                fixes: {
                    raw:    "Cross-Origin-Opener-Policy: same-origin",
                    nginx:  'add_header Cross-Origin-Opener-Policy "same-origin" always;',
                    apache: 'Header set Cross-Origin-Opener-Policy "same-origin"'
                }
            },
            'Cross-Origin-Embedder-Policy': {
                fixes: {
                    raw:    "Cross-Origin-Embedder-Policy: require-corp",
                    nginx:  'add_header Cross-Origin-Embedder-Policy "require-corp" always;',
                    apache: 'Header set Cross-Origin-Embedder-Policy "require-corp"'
                }
            },
            'Cross-Origin-Resource-Policy': {
                fixes: {
                    raw:    "Cross-Origin-Resource-Policy: same-origin",
                    nginx:  'add_header Cross-Origin-Resource-Policy "same-origin" always;',
                    apache: 'Header set Cross-Origin-Resource-Policy "same-origin"'
                }
            }
        };

        // ── Client-side header analysis ───────────────────────────────────────
        function analyzeHeaders(headersObj) {
            const headerKeys = Object.keys(SECURITY_HEADERS_CONFIG);
            const pointsPerHeader = 100 / headerKeys.length;
            let totalScore = 0;
            const results = [];

            for (const headerName of headerKeys) {
                // Case-insensitive lookup
                const lowerKey = headerName.toLowerCase();
                let value = null;
                for (const [k, v] of Object.entries(headersObj)) {
                    if (k.toLowerCase() === lowerKey) { value = v; break; }
                }

                if (value) {
                    totalScore += pointsPerHeader;
                    results.push({ header: headerName, status: 'Present', value });
                } else {
                    results.push({
                        header: headerName,
                        status: 'Missing',
                        suggested_fixes: SECURITY_HEADERS_CONFIG[headerName].fixes
                    });
                }
            }
            return { results, score: Math.round(totalScore) };
        }

        // ── Django backend API call ────────────────────────────────────────────
        const API_BASE = "https://headerback.onrender.com";

        async function fetchFromBackend(rawUrl) {
            let url = rawUrl.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            const response = await fetch(`${API_BASE}/analyze/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: rawUrl })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Server error.');
            return data;
        }

        // Load history on page load
        window.onload = () => {
            renderHistory();
            CyberTheme.typeWriter('hero-typewriter', 'Advanced HTTP Header Security Intelligence', 40);
        }

        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const urlInput = document.getElementById('target-url').value.trim();
            const resultsDisplay = document.getElementById('results-display');
            const fixesDisplay = document.getElementById('fixes-display');
            
            if (!urlInput) {
                alert("Please enter a URL first!");
                return;
            }

            // Reset fixes panel
            fixesDisplay.innerHTML = '';
            document.getElementById('gen-fixes-btn').style.display = 'none';

            // Scroll to results
            resultsDisplay.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Show Loading UI
            resultsDisplay.innerHTML = `
                <div class="analyzer-card fade-in">
                    <div class="loading-container">
                        <div id="loading-msg" class="loading-text" style="font-family: 'Orbitron'; color: var(--secondary); margin-bottom: 20px;">INITIALIZING SCAN...</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                    </div>
                </div>
            `;

            const loadingMessages = [
                "Scanning target infrastructure...",
                "Retrieving HTTP response headers...",
                "Analyzing security policies...",
                "Finalizing security intelligence..."
            ];

            const msgElement = document.getElementById('loading-msg');
            const fillElement = document.getElementById('progress-fill');

            // Animate loading messages while fetching
            let msgIndex = 0;
            const msgInterval = setInterval(() => {
                if (msgIndex < loadingMessages.length) {
                    msgElement.innerText = loadingMessages[msgIndex].toUpperCase();
                    fillElement.style.width = `${((msgIndex + 1) / loadingMessages.length) * 75}%`;
                    msgIndex++;
                }
            }, 800);

            try {
                // ── Call the Django backend ───────────────────────────────────
                const data = await fetchFromBackend(urlInput);

                clearInterval(msgInterval);
                fillElement.style.width = "100%";
                await new Promise(r => setTimeout(r, 300));

                const score = data.security_score;
                let riskLevel = "";
                let riskColor = "";

                if (score > 50) {
                    riskLevel = "SAFE";
                    riskColor = "#00ff88";
                } else if (score >= 30) {
                    riskLevel = "RISK LEVEL: MEDIUM";
                    riskColor = "#ffcc00";
                } else {
                    riskLevel = "RISK LEVEL: DANGEROUS";
                    riskColor = "#ff4444";
                }

                function getScoreColor(s) {
                    const hue = (s / 100) * 120;
                    return `hsl(${hue}, 100%, 50%)`;
                }

                const dynamicColor = getScoreColor(score);

                // Store data for fixes generator
                lastAnalysisData = data;
                document.getElementById('gen-fixes-btn').style.display = 'block';

                // Save to History
                saveToHistory(data.url, score, dynamicColor);


                // Build Final Display
                let outputHtml = `
                    <div class="score-card fade-in">
                        <h2 style="font-family: 'Orbitron'; margin-bottom: 30px;">SHIELD REPORT: ${data.url}</h2>
                        
                        <div class="score-box">
                            <svg class="score-svg" width="200" height="200">
                                <circle class="score-circle-bg" cx="100" cy="100" r="90"></circle>
                                <circle id="score-circle-val" class="score-circle-val" cx="100" cy="100" r="90" style="stroke: ${dynamicColor};"></circle>
                            </svg>
                            <div class="score-text">
                                <span class="score-number" id="animated-score">0</span>
                                <span class="score-label">SHIELD SCORE</span>
                            </div>
                        </div>

                        <div class="risk-level" style="background: ${riskColor}22; border: 1px solid ${riskColor}; color: ${riskColor};">
                            ${riskLevel}
                        </div>
                    </div>

                    <div class="results-grid">
                `;

                data.headers_analyzed.forEach((item, index) => {
                    const statusColor = item.status === "Present" ? "#00ff88" : "#ff4444";
                    outputHtml += `
                        <div class="result-item fade-in" style="animation-delay: ${index * 0.1}s">
                            <div class="header-status">
                                <strong style="color: #fff; font-size: 1.1rem;">${item.header}</strong>
                                <span class="status-badge" style="border: 1px solid ${statusColor}; color: ${statusColor};">${item.status.toUpperCase()}</span>
                            </div>
                            
                            ${item.status === 'Present' 
                                ? `<p style="font-family: monospace; font-size: 0.85rem; color: #888; overflow-wrap: break-word;">${item.value}</p>`
                                : `<div class="fix-box">
                                     <div style="font-size: 0.7rem; color: #aaa; text-transform: uppercase;">Suggested Implementation (Raw)</div>
                                     <code>${item.suggested_fixes.raw}</code>
                                   </div>`
                            }
                        </div>
                    `;
                });

                outputHtml += `</div>`;
                resultsDisplay.innerHTML = outputHtml;

                // Automatically show fixes if missing headers exist
                renderAutoFixes(data);

                // Animate Circle and Number
                setTimeout(() => {
                    const circle = document.getElementById('score-circle-val');
                    const circumference = 2 * Math.PI * 90;
                    const offset = circumference - (score / 100) * circumference;
                    circle.style.strokeDashoffset = offset;

                    let current = 0;
                    const timer = setInterval(() => {
                        if (current >= score) {
                            clearInterval(timer);
                        } else {
                            current++;
                            const scoreNum = document.getElementById('animated-score');
                            if (scoreNum) {
                                scoreNum.innerText = current;
                                scoreNum.style.color = getScoreColor(current);
                            }
                        }
                    }, 20);
                }, 100);

            } catch (error) {
                clearInterval(msgInterval);
                console.error("Analysis Error:", error);

                const isConnectionError = error instanceof TypeError || error.name === 'TypeError';
                
                if (isConnectionError) {
                    // Server is not running — show start guide
                    resultsDisplay.innerHTML = `
                        <div class="analyzer-card fade-in" style="border-color: #ffcc00; background: rgba(255, 204, 0, 0.05);">
                            <h3 style="color: #ffcc00; font-family: 'Orbitron'; text-align: center; margin-bottom: 20px;">⚡ BACKEND SERVER NOT RUNNING</h3>
                            <p style="color: #ccc; text-align: center; margin-bottom: 25px;">
                                The security analyzer requires the backend server to be running.<br>
                                Follow the steps below to start it.
                            </p>
                            <div style="background: #000; border: 1px solid #ffcc00; border-radius: 8px; padding: 25px; margin-bottom: 15px; text-align: center;">
                                <div style="color: #ffcc00; font-size: 1.1rem; letter-spacing: 1px; margin-bottom: 15px;">SOLUTION:</div>
                                <p style="color: #fff; font-size: 1.2rem; margin-bottom: 10px;">Double-click <strong style="color: var(--primary);">START_HEADER_SHIELD.bat</strong> in your project folder!</p>
                                <p style="color: #555; font-size: 0.9rem; margin: 0;">(Running it natively ensures the server stays alive even if Antigravity is closed!)</p>
                            </div>
                            <p style="color: #555; font-size: 0.85rem; text-align: center;">
                                💡 Optional: Use <strong style="color:#ccc;">Launch_Hidden.vbs</strong> if you want it to run silently in the background.
                            </p>
                        </div>
                    `;
                } else {
                    // Actual scan error (bad URL, timeout, etc.)
                    resultsDisplay.innerHTML = `
                        <div class="analyzer-card fade-in" style="border-color: var(--danger); text-align: center;">
                            <h3 style="color: var(--danger);">⚠ SCAN FAILED</h3>
                            <p style="color: #ccc; margin-bottom: 8px;">${error.message}</p>
                            <p style="color: #777; font-size: 0.85rem;">Make sure the URL is reachable and try again.</p>
                        </div>
                    `;
                }
            }
        });

        // Auto-Generate Fixes Summary
        const genFixesBtn = document.getElementById('gen-fixes-btn');

        genFixesBtn.addEventListener('click', () => {
            if (!lastAnalysisData) return;
            renderFixesModal();
        });

        function renderFixesModal(format = 'nginx') {
            const missingHeaders = lastAnalysisData.headers_analyzed.filter(h => h.status === 'Missing');
            
            if (missingHeaders.length === 0) {
                alert("Your website is already fully protected! No fixes needed.");
                return;
            }

            const fixContent = missingHeaders.map(h => h.suggested_fixes[format]).join('\n');
            const formats = ['nginx', 'apache', 'raw'];
            
            // Remove existing modal if any
            const existing = document.querySelector('.modal-overlay');
            if (existing) existing.remove();

            const fixModal = document.createElement('div');
            fixModal.className = 'modal-overlay';
            fixModal.style.cssText = 'display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000;';
            
            fixModal.innerHTML = `
                <div class="modal-content" style="background: var(--bg-card); border: 1px solid var(--primary); padding: 40px; border-radius: 15px; text-align: center; max-width: 700px; width: 90%; box-shadow: 0 0 30px rgba(255, 20, 147, 0.3);">
                    <h2 style="font-family: 'Orbitron'; color: var(--secondary); margin-bottom: 20px;">AUTO-GENERATED FIXES</h2>
                    
                    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
                        ${formats.map(f => `
                            <button onclick="renderFixesModal('${f}')" 
                                    style="padding: 8px 15px; border-radius: 4px; border: 1px solid ${format === f ? 'var(--primary)' : '#444'}; 
                                           background: ${format === f ? 'rgba(255, 20, 147, 0.2)' : 'transparent'}; 
                                           color: ${format === f ? 'var(--primary)' : '#888'}; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; font-size: 0.7rem;">
                                ${f}
                            </button>
                        `).join('')}
                    </div>

                    <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 15px;">Copy these ${format.toUpperCase()} directives to your configuration:</p>
                    <div style="background: #000; padding: 20px; border-radius: 8px; border: 1px solid var(--primary); text-align: left; position: relative;">
                        <pre id="modal-fix-content" style="color: var(--secondary); font-family: 'Courier New', monospace; white-space: pre-wrap; margin: 0; font-size: 0.9rem;">${fixContent}</pre>
                        <button onclick="copyFixes(this, 'modal-fix-content')" 
                                style="position: absolute; top: 10px; right: 10px; background: var(--primary); border: none; color: #fff; font-size: 0.7rem; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                            COPY ALL
                        </button>
                    </div>
                    <button style="margin-top: 20px; background: transparent; border: 1px solid #555; color: #888; padding: 10px 30px; cursor: pointer; border-radius: 6px;" onclick="this.closest('.modal-overlay').remove()">CLOSE</button>
                </div>
            `;
            document.body.appendChild(fixModal);
        }

        function renderAutoFixes(data, format = 'nginx') {
            const fixesDisplay = document.getElementById('fixes-display');
            const missingHeaders = data.headers_analyzed.filter(h => h.status === 'Missing');
            
            if (missingHeaders.length === 0) {
                fixesDisplay.innerHTML = '';
                return;
            }

            const fixContent = missingHeaders.map(h => h.suggested_fixes[format]).join('\n');
            const formats = ['nginx', 'apache', 'raw'];
            
            fixesDisplay.innerHTML = `
                <div class="analyzer-card fade-in" style="border-color: var(--primary); background: rgba(255, 20, 147, 0.05);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-family: 'Orbitron'; color: var(--primary); margin: 0; font-size: 1.2rem;">AUTO-GENERATED FIXES</h2>
                        <div style="display: flex; gap: 5px;">
                            ${formats.map(f => `
                                <button onclick="renderAutoFixes(lastAnalysisData, '${f}')" 
                                        style="padding: 5px 10px; border-radius: 4px; border: 1px solid ${format === f ? 'var(--primary)' : '#444'}; 
                                               background: ${format === f ? 'rgba(255, 20, 147, 0.2)' : 'transparent'}; 
                                               color: ${format === f ? 'var(--primary)' : '#888'}; cursor: pointer; font-size: 0.65rem; text-transform: uppercase;">
                                    ${f}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 15px; text-align: left;">Recommended ${format.toUpperCase()} configuration for missing headers:</p>
                    <div style="background: #000; padding: 20px; border-radius: 8px; border: 1px solid rgba(255, 20, 147, 0.3); text-align: left; position: relative;">
                        <pre id="fix-content-pre" style="color: var(--secondary); font-family: 'Courier New', monospace; white-space: pre-wrap; margin: 0; font-size: 0.9rem;">${fixContent}</pre>
                        <button onclick="copyFixes(this, 'fix-content-pre')" 
                                style="position: absolute; top: 10px; right: 10px; background: var(--primary); border: none; color: #fff; font-size: 0.7rem; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                            COPY
                        </button>
                    </div>
                </div>
            `;
        }

        function copyFixes(btn, elementId) {
            const pre = document.getElementById(elementId);
            if (pre) {
                navigator.clipboard.writeText(pre.innerText);
                const originalText = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.style.background = '#00ff88';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = 'var(--primary)';
                }, 2000);
            }
        }

        function saveToHistory(url, score, color) {
            let history = JSON.parse(localStorage.getItem('header_shield_history') || '[]');
            history.unshift({ url, score, color, timestamp: new Date().getTime() });
            history = history.slice(0, 10);
            localStorage.setItem('header_shield_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('header_shield_history') || '[]');
            const list = document.getElementById('history-list');
            
            if (history.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #555; padding: 20px;">No recent scans</div>';
                return;
            }

            list.innerHTML = history.map((item, index) => `
                <div class="history-item">
                    <div style="display: flex; align-items: center;">
                        <span class="history-url" title="${item.url}">${item.url}</span>
                        <span class="delete-history" onclick="deleteFromHistory(${index})" title="Delete entry">✕</span>
                    </div>
                    <span class="history-score" style="border: 1px solid ${item.color}; color: ${item.color};">${item.score}/100</span>
                </div>
            `).join('');
        }

        function deleteFromHistory(index) {
            let history = JSON.parse(localStorage.getItem('header_shield_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('header_shield_history', JSON.stringify(history));
            renderHistory();
        }
    </script>
</body>
</html>
